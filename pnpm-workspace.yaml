packages:
  - apps/*
  - packages/*

catalogMode: prefer

catalog:
  "@types/node": ^22.10.2
  typescript: ^6.0.2
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: 4.1.9
  vite-plus: latest

overrides:
  vite: "catalog:"
  vitest: "catalog:"
  # Pin away from a freshly-published patch (3.3.15) that trips Vite+'s
  # minimum-release-age supply-chain guardrail. 3.3.11 satisfies all ^3 ranges.
  nanoid: 3.3.11

pnpm:
  onlyBuiltDependencies:
    - esbuild
    - lightningcss
  peerDependencyRules:
    allowAny:
      - vite
      - vitest
    allowedVersions:
      vite: "*"
      vitest: "*"
